services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script ini dijalankan otomatis saat container pertama kali dibuat
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Catalogue Service ───────────────────────────────────────────────────────
  catalogue-service:
    build:
      context: ./catalogue-service
      dockerfile: Dockerfile
    container_name: catalogue-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalogue_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Order Service ───────────────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # Catalogue diakses lewat api-gateway (nama container), bukan localhost
      CATALOGUE_SERVICE_URL: http://api-gateway:8080/api/products
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      # Override routing URL supaya mengarah ke nama container, bukan localhost
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI: http://catalogue-service:8081
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI: http://order-service:8082
    ports:
      - "8080:8080"
    depends_on:
      - catalogue-service

volumes:
  postgres_data:
